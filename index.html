<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Integrado de Personal y Asistencia QR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .calendar-day { min-height: 40px; }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen text-slate-800">

    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-id-card-clip"></i> ERP Personal & Control QR
            </h1>
            <button onclick="exportarBackup()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded text-sm font-semibold transition-all shadow flex items-center gap-2 w-full sm:w-auto justify-center">
                <i class="fa-solid fa-database"></i> Exportar Backup (.js)
            </button>
        </div>
    </nav>

    <div class="container mx-auto p-4 grid grid-cols-1 xl:grid-cols-3 gap-6">
        
        <div class="xl:col-span-1 space-y-6">
            
            <div class="bg-white p-5 rounded-xl shadow border-t-4 border-indigo-600">
                <h2 class="text-md font-bold text-slate-700 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-qrcode text-indigo-600"></i> Escáner de Asistencia Móvil
                </h2>
                <div id="reader" class="w-full bg-slate-50 rounded-lg border border-dashed border-slate-300 overflow-hidden"></div>
                <div class="mt-3">
                    <button onclick="iniciarEscaneoQR()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-lg font-medium text-sm transition-all flex justify-center items-center gap-2 shadow">
                        <i class="fa-solid fa-camera"></i> Activar Cámara Trasera
                    </button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-md font-bold text-slate-700 flex items-center gap-2">
                        <i class="fa-solid fa-calendar-days text-rose-500"></i> Control y Calendario
                    </h2>
                    <div class="flex gap-1">
                        <button onclick="cambiarMes(-1)" class="p-1 hover:bg-slate-100 rounded text-xs"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="mesAnoActual" class="text-xs font-bold uppercase tracking-wider text-slate-600 self-center"></span>
                        <button onclick="cambiarMes(1)" class="p-1 hover:bg-slate-100 rounded text-xs"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-400 mb-1">
                    <div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div>
                </div>
                <div id="diasCalendario" class="grid grid-cols-7 gap-1 text-xs"></div>

                <div class="mt-4 pt-3 border-t border-slate-100">
                    <button onclick="modalGestionarAsistencias()" class="w-full bg-rose-500 hover:bg-rose-600 text-white py-2 px-4 rounded-lg font-medium text-sm transition-all flex justify-center items-center gap-2">
                        <i class="fa-solid fa-sliders"></i> Administrar Marcaciones
                    </button>
                </div>
            </div>

        </div>

        <div class="xl:col-span-2 space-y-6">
            <div class="bg-white p-5 rounded-xl shadow border-t-4 border-emerald-500">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                    <h2 class="text-md font-bold text-slate-700 flex items-center gap-2">
                        <i class="fa-solid fa-users text-emerald-500"></i> Registro de Personal Activo
                    </h2>
                    <button onclick="modalCrearOEditarTrabajador()" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow flex items-center justify-center gap-2">
                        <i class="fa-solid fa-user-plus"></i> Registrar Trabajador
                    </button>
                </div>

                <div class="overflow-x-auto rounded-lg border border-slate-200">
                    <table class="min-w-full divide-y divide-slate-200 text-left text-xs sm:text-sm">
                        <thead class="bg-slate-50 text-slate-600 font-semibold uppercase tracking-wider">
                            <tr>
                                <th class="p-3">DNI</th>
                                <th class="p-3">Trabajador</th>
                                <th class="p-3 text-center">Género</th>
                                <th class="p-3 text-center">Edad</th>
                                <th class="p-3">Teléfono</th>
                                <th class="p-3 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaTrabajadores" class="divide-y divide-slate-200 text-slate-600 bg-white">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Base de datos de los 15 Trabajadores obligatorios cargados explícitamente
        let trabajadores = [
            { dni: "45871239", nombres: "Juan Carlos", apellidos: "Mendoza Quispe", genero: "Masculino", edad: 28, telefono: "987654321" },
            { dni: "71245982", nombres: "María Elena", apellidos: "Flores Huamán", genero: "Femenino", edad: 34, telefono: "951234567" },
            { dni: "25896417", nombres: "Carlos Alberto", apellidos: "Gutiérrez Tello", genero: "Masculino", edad: 42, telefono: "963852741" },
            { dni: "48512369", nombres: "Ana Lucía", apellidos: "Palomino Rojas", genero: "Femenino", edad: 25, telefono: "942159367" },
            { dni: "09845126", nombres: "Luis Fernando", apellidos: "Cárdenas Sulca", genero: "Masculino", edad: 31, telefono: "974123852" },
            { dni: "74125896", nombres: "Diana Carolina", apellidos: "Chávez Medina", genero: "Femenino", edad: 29, telefono: "912345678" },
            { dni: "43217895", nombres: "Jorge Luis", apellidos: "Ramos Ccoyllo", genero: "Masculino", edad: 45, telefono: "956789123" },
            { dni: "70258143", nombres: "Sofía Beatriz", apellidos: "Torres Gutiérrez", genero: "Femenino", edad: 23, telefono: "935412789" },
            { dni: "10245896", nombres: "Ricardo Alonso", apellidos: "Morales Vila", genero: "Masculino", edad: 38, telefono: "981245763" },
            { dni: "46985214", nombres: "Gabriela Fernanda", apellidos: "Ortiz Bellido", genero: "Femenino", edad: 27, telefono: "924578136" },
            { dni: "72541369", nombres: "Miguel Ángel", apellidos: "Castro Yupanqui", genero: "Masculino", edad: 33, telefono: "968531742" },
            { dni: "25413698", nombres: "Valeria Alejandra", apellidos: "Nuñez Paucar", genero: "Femenino", edad: 30, telefono: "947152638" },
            { dni: "41258963", nombres: "Christian Omar", apellidos: "Herrera Díaz", genero: "Masculino", edad: 50, telefono: "993254147" },
            { dni: "73625148", nombres: "Claudia Marcela", apellidos: "Vargas Machuca", genero: "Femenino", edad: 26, telefono: "915487236" },
            { dni: "08965412", nombres: "Alejandro José", apellidos: "Méndez Paredes", genero: "Masculino", edad: 36, telefono: "972365148" }
        ];

        let asistencias = [];
        let fechaFiltroCalendario = new Date(); 
        let html5QrScannerInstance = null;

        document.addEventListener("DOMContentLoaded", () => {
            renderizarTrabajadores();
            renderizarCalendario();
        });

        // RENDERS DE VISTA
        function renderizarTrabajadores() {
            const tbody = document.getElementById("tablaTrabajadores");
            tbody.innerHTML = "";
            trabajadores.forEach(t => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-3 font-mono font-bold text-indigo-600">${t.dni}</td>
                        <td class="p-3">
                            <div class="font-semibold text-slate-800">${t.nombres}</div>
                            <div class="text-xs text-slate-400">${t.apellidos}</div>
                        </td>
                        <td class="p-3 text-center">
                            <span class="px-2 py-0.5 text-xs font-medium rounded-full ${t.genero === 'Femenino' ? 'bg-pink-100 text-pink-700' : 'bg-blue-100 text-blue-700'}">${t.genero}</span>
                        </td>
                        <td class="p-3 text-center">${t.edad}</td>
                        <td class="p-3 font-mono text-slate-500">${t.telefono}</td>
                        <td class="p-3 text-center space-x-2">
                            <button onclick="modalCrearOEditarTrabajador('${t.dni}')" class="text-indigo-600 hover:text-indigo-900 transition-all" title="Editar"><i class="fa-solid fa-user-pen"></i></button>
                            <button onclick="eliminarTrabajador('${t.dni}')" class="text-rose-600 hover:text-rose-900 transition-all" title="Eliminar"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function renderizarCalendario() {
            const contenedorDias = document.getElementById("diasCalendario");
            const lblMesAno = document.getElementById("mesAnoActual");
            contenedorDias.innerHTML = "";

            const año = fechaFiltroCalendario.getFullYear();
            const mes = fechaFiltroCalendario.getMonth();

            const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            lblMesAno.innerText = `${nombresMeses[mes]} ${año}`;

            const primerDiaMes = new Date(año, mes, 1).getDay();
            const totalDiasMes = new Date(año, mes + 1, 0).getDate();

            for (let i = 0; i < primerDiaMes; i++) {
                contenedorDias.innerHTML += `<div class="p-1"></div>`;
            }

            for (let dia = 1; dia <= totalDiasMes; dia++) {
                const fechaStr = `${año}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const totalMarcacionesDia = asistencias.filter(a => a.fecha === fechaStr).length;

                let indicadorAsistencia = "";
                if(totalMarcacionesDia > 0) {
                    indicadorAsistencia = `<span class="absolute bottom-1 right-1 w-4 h-4 bg-emerald-500 text-[10px] text-white rounded-full flex items-center justify-center font-bold">${totalMarcacionesDia}</span>`;
                }

                contenedorDias.innerHTML += `
                    <div onclick="modalDetalleDiaAsistencia('${fechaStr}')" class="relative bg-slate-50 border border-slate-200 rounded p-1 text-left font-semibold text-slate-700 hover:bg-indigo-50 cursor-pointer transition-all calendar-day h-12">
                        <span>${dia}</span>
                        ${indicadorAsistencia}
                    </div>
                `;
            }
        }

        function cambiarMes(direccion) {
            fechaFiltroCalendario.setMonth(fechaFiltroCalendario.getMonth() + direccion);
            renderizarCalendario();
        }

        // CRUD TRABAJADORES (SWEETALERT2)
        async function modalCrearOEditarTrabajador(dniEditable = null) {
            const esEdicion = dniEditable !== null;
            let item = esEdicion ? trabajadores.find(t => t.dni === dniEditable) : { dni: '', nombres: '', apellidos: '', genero: 'Masculino', edad: '', telefono: '' };

            const { value: formValues } = await Swal.fire({
                title: esEdicion ? '<b>Modificar Datos de Trabajador</b>' : '<b>Registrar Nuevo Trabajador</b>',
                icon: 'question',
                html: `
                    <div class="text-left text-xs font-semibold text-slate-500 mb-1 ml-1">DNI (8 dígitos):</div>
                    <input id="sw-dni" class="swal2-input !mt-0 !mb-3" placeholder="Ej. 45871239" value="${item.dni}" ${esEdicion ? 'disabled style="background:#e2e8f0; color:#64748b;"' : ''}>
                    <div class="text-left text-xs font-semibold text-slate-500 mb-1 ml-1">Nombres:</div>
                    <input id="sw-nombres" class="swal2-input !mt-0 !mb-3" placeholder="Ej. Juan Carlos" value="${item.nombres}">
                    <div class="text-left text-xs font-semibold text-slate-500 mb-1 ml-1">Apellidos:</div>
                    <input id="sw-apellidos" class="swal2-input !mt-0 !mb-3" placeholder="Ej. Mendoza Quispe" value="${item.apellidos}">
                    <div class="text-left text-xs font-semibold text-slate-500 mb-1 ml-1">Género:</div>
                    <select id="sw-genero" class="swal2-input !mt-0 !mb-3">
                        <option value="Masculino" ${item.genero === 'Masculino' ? 'selected' : ''}>Masculino</option>
                        <option value="Femenino" ${item.genero === 'Femenino' ? 'selected' : ''}>Femenino</option>
                    </select>
                    <div class="text-left text-xs font-semibold text-slate-500 mb-1 ml-1">Edad:</div>
                    <input id="sw-edad" type="number" class="swal2-input !mt-0 !mb-3" placeholder="Ej. 28" value="${item.edad}">
                    <div class="text-left text-xs font-semibold text-slate-500 mb-1 ml-1">Celular/Teléfono:</div>
                    <input id="sw-telefono" class="swal2-input !mt-0 !mb-1" placeholder="Ej. 987654321" value="${item.telefono}">
                `,
                showCancelButton: true,
                confirmButtonText: 'Confirmar Guardado',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#4f46e5',
                preConfirm: () => {
                    const data = {
                        dni: document.getElementById('sw-dni').value.trim(),
                        nombres: document.getElementById('sw-nombres').value.trim(),
                        apellidos: document.getElementById('sw-apellidos').value.trim(),
                        genero: document.getElementById('sw-genero').value,
                        edad: parseInt(document.getElementById('sw-edad').value),
                        telefono: document.getElementById('sw-telefono').value.trim()
                    };
                    if(!data.dni || !data.nombres || !data.apellidos || isNaN(data.edad) || !data.telefono) {
                        Swal.showValidationMessage('Todos los campos son obligatorios.');
                        return false;
                    }
                    if(!esEdicion && trabajadores.some(t => t.dni === data.dni)) {
                        Swal.showValidationMessage('Este número de DNI ya existe.');
                        return false;
                    }
                    return data;
                }
            });

            if (formValues) {
                if (esEdicion) {
                    const index = trabajadores.findIndex(t => t.dni === dniEditable);
                    trabajadores[index] = formValues;
                } else {
                    trabajadores.push(formValues);
                }
                renderizarTrabajadores();
                Swal.fire('¡Proceso Exitoso!', 'Los registros del personal fueron actualizados.', 'success');
            }
        }

        function eliminarTrabajador(dni) {
            Swal.fire({
                title: '¿Confirmas la eliminación?',
                text: `El trabajador con DNI ${dni} será removido del sistema local.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Sí, remover',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    trabajadores = trabajadores.filter(t => t.dni !== dni);
                    renderizarTrabajadores();
                    Swal.fire('Eliminado', 'Trabajador removido con éxito.', 'success');
                }
            });
        }

        // CONTROL DE ASISTENCIAS
        async function modalGestionarAsistencias() {
            let optionsHtml = trabajadores.map(t => `<option value="${t.dni}">${t.apellidos}, ${t.nombres} (${t.dni})</option>`).join('');
            
            const { value: formValues } = await Swal.fire({
                title: '<b>Marcación Manual Administrativa</b>',
                html: `
                    <div class="text-left text-xs font-semibold text-slate-500 mb-1 ml-1">Seleccionar Personal:</div>
                    <select id="as-dni" class="swal2-input !mt-0 !mb-3">${optionsHtml}</select>
                    <div class="text-left text-xs font-semibold text-slate-500 mb-1 ml-1">Fecha de Registro:</div>
                    <input id="as-fecha" type="date" class="swal2-input !mt-0 !mb-3" value="${new Date().toISOString().split('T')[0]}">
                    <div class="text-left text-xs font-semibold text-slate-500 mb-1 ml-1">Tipo de Evento:</div>
                    <select id="as-tipo" class="swal2-input !mt-0">
                        <option value="Entrada">Entrada</option>
                        <option value="Salida">Salida</option>
                    </select>
                `,
                showCancelButton: true,
                confirmButtonText: 'Asentar Registro',
                confirmButtonColor: '#10b981',
                preConfirm: () => {
                    return {
                        dni: document.getElementById('as-dni').value,
                        fecha: document.getElementById('as-fecha').value,
                        tipo: document.getElementById('as-tipo').value
                    }
                }
            });

            if(formValues) {
                procesarInyeccionAsistencia(formValues.dni, formValues.fecha, formValues.tipo, "Manual (Admin)");
            }
        }

        function procesarInyeccionAsistencia(dni, fecha, tipo, metodo) {
            const t = trabajadores.find(x => x.dni === dni);
            if(!t) {
                Swal.fire('Error', 'El DNI no corresponde a ningún trabajador.', 'error');
                return;
            }

            const h = new Date();
            const horaActualStr = h.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            asistencias.push({
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                dni: t.dni,
                nombreCompleto: `${t.nombres} ${t.apellidos}`,
                fecha: fecha,
                hora: horaActualStr,
                tipo: tipo,
                metodo: metodo
            });

            renderizarCalendario();
            Swal.fire({
                icon: 'success',
                title: 'Marcación Registrada',
                text: `${t.nombres} - ${tipo} registrado el ${fecha}`,
                timer: 2000,
                showConfirmButton: false
            });
        }

        function modalDetalleDiaAsistencia(fechaSeleccionada) {
            const listado = asistencias.filter(a => a.fecha === fechaSeleccionada);
            let contenidoHtml = `<div class="text-left text-xs text-slate-500 mb-4">Marcaciones asociadas a la fecha: <b>${fechaSeleccionada}</b></div>`;

            if(listado.length === 0) {
                contenidoHtml += `<p class="text-slate-400 italic text-center py-4">No hay asistencias guardadas en este día.</p>`;
            } else {
                contenidoHtml += `<div class="space-y-2 max-h-60 overflow-y-auto pr-1">`;
                listado.forEach(a => {
                    contenidoHtml += `
                        <div class="bg-slate-50 p-2.5 rounded border border-slate-200 flex justify-between items-center text-left text-xs">
                            <div>
                                <div class="font-bold text-slate-800">${a.nombreCompleto}</div>
                                <div class="text-slate-500 font-mono">DNI: ${a.dni} | Hora: ${a.hora}</div>
                                <div class="text-[10px] text-indigo-500 font-medium">${a.metodo}</div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="px-1.5 py-0.5 font-bold rounded ${a.tipo === 'Entrada' ? 'bg-emerald-100 text-emerald-800':'bg-amber-100 text-amber-800'}">${a.tipo}</span>
                                <button onclick="Swal.close(); eliminarAsistencia('${a.id}', '${fechaSeleccionada}')" class="text-rose-500 hover:text-rose-700 text-sm"><i class="fa-solid fa-square-xmark"></i></button>
                            </div>
                        </div>
                    `;
                });
                contenidoHtml += `</div>`;
            }

            Swal.fire({
                title: `<b>Control de Asistencia Diario</b>`,
                html: contenidoHtml,
                showConfirmButton: true,
                confirmButtonText: 'Cerrar Ventana',
                confirmButtonColor: '#64748b'
            });
        }

        function eliminarAsistencia(id, fechaRebote) {
            asistencias = asistencias.filter(a => a.id !== id);
            renderizarCalendario();
            setTimeout(() => { modalDetalleDiaAsistencia(fechaRebote); }, 300);
        }

        // ESCÁNER DE CÁMARA (QR CODE)
        function iniciarEscaneoQR() {
            if (!html5QrScannerInstance) {
                html5QrScannerInstance = new Html5Qrcode("reader");
            }
            
            const qrSuccessCallback = (decodedText) => {
                html5QrScannerInstance.stop().then(() => {
                    const hoy = new Date().toISOString().split('T')[0];
                    procesarInyeccionAsistencia(decodedText.trim(), hoy, "Entrada", "Lector QR Móvil");
                }).catch(err => console.error("Error deteniendo cámara:", err));
            };

            const configuracionScanner = { fps: 12, qrbox: { width: 230, height: 230 } };

            html5QrScannerInstance.start({ facingMode: "environment" }, configuracionScanner, qrSuccessCallback)
            .catch(() => {
                Swal.fire('Lector de Cámara', 'Se requieren permisos de cámara o un entorno HTTPS/localhost.', 'error');
            });
        }

        // RESPALDO DE SEGURIDAD (EXPORTAR BACKUP .JS)
        function exportarBackup() {
            const plantillaCodigo = `/**
 * BACKUP DE SEGURIDAD GENERAL - SISTEMA DE PERSONAL
 * Exportado el día: ${new Date().toLocaleString()}
 */

const BACKUP_TRABAJADORES = ${JSON.stringify(trabajadores, null, 4)};

const BACKUP_ASISTENCIAS = ${JSON.stringify(asistencias, null, 4)};

console.log("¡Estructura de Backup JS cargada con éxito!");`;
            
            const archivoBlob = new Blob([plantillaCodigo], { type: 'text/javascript' });
            const enlaceDescarga = document.createElement('a');
            enlaceDescarga.href = URL.createObjectURL(archivoBlob);
            enlaceDescarga.download = `backup_rrhh_${Date.now()}.js`;
            document.body.appendChild(enlaceDescarga);
            enlaceDescarga.click();
            document.body.removeChild(enlaceDescarga);
            URL.revokeObjectURL(enlaceDescarga.href);
        }
    </script>
</body>
</html>
